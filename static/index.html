  // ── hint splitting ──────────────────────────────────────
  function splitHint(front) {
    const m = front.match(/^(.*?)\s*(\[hint:.*\])\s*$/);
    if (m) return { sentence: m[1], hint: m[2] };
    return { sentence: front, hint: "" };
  }

  function reviewLabel(c) {
    const mode = c && c.review_mode;
    if (mode === "gate") return '<span class="card-label label-gate">Gate</span>';
    if (mode === "repair") return '<span class="card-label label-repair">Repair</span>';
    return '<span class="card-label label-review">Review</span>';
  }

  function renderCardFront(c) {
    const isProd = c.skill_type && c.skill_type.includes("prod");
    if (isProd) {
      const { sentence, hint } = splitHint(c.front);
      let html = "";
      if (c.translation_en) html += `<div class="card-translation">${esc(c.translation_en)}</div>`;
      html += `<div class="card-front">${esc(sentence)}</div>`;
      if (hint) html += `<div class="card-hint">${esc(hint)}</div>`;
      return html;
    }
    const isRecog = c.skill_type && c.skill_type.includes("recog");
    if (isRecog) {
      const cleaned = c.front.replace(/\n\n질문:.*$/, "");
      return `<div class="card-front">${renderRecogSentence(cleaned, c.headword)}</div>`;
    }
    return `<div class="card-front">${esc(c.front)}</div>`;
  }

  // ── click-to-add: clickable words in a recognition sentence ──────
  const clickAddedWords = new Set();
  let clickAddState = null;  // { word, el, parsed, defBlock }

  // Render a recognition sentence: the [[target]] is highlighted (not
  // clickable); every other Korean word is a clickable add-card trigger.
  // The [[...]] target is matched on the full string first, so multi-word
  // targets (which contain spaces) render as a single highlight.
  function renderRecogSentence(text, headword) {
    // Fallback: a few variants are missing the [[ ]] cloze markers, so the
    // target wouldn't highlight. Bracket the headword (or its 하다/되다 stem,
    // for conjugated adjectives/verbs like 저렴하다 → 저렴) so it still shows blue.
    if (headword && !/\[\[.+?\]\]/.test(text)) {
      const cands = [headword];
      if (headword.endsWith("하다") || headword.endsWith("되다")) cands.push(headword.slice(0, -2));
      for (const cand of cands) {
        const idx = cand ? text.indexOf(cand) : -1;
        if (idx !== -1) {
          text = text.slice(0, idx) + "[[" + cand + "]]" + text.slice(idx + cand.length);
          break;
        }
      }
    }
    let html = "";
    const re = /\[\[(.+?)\]\]/g;
    let last = 0, m;
    while ((m = re.exec(text)) !== null) {
      html += renderClickableRun(text.slice(last, m.index));
      html += `<span class="highlight">${esc(m[1])}</span>`;
      last = m.index + m[0].length;
    }
    html += renderClickableRun(text.slice(last));
    return html;
  }

  // Tokenize a bracket-free run of text, making each Korean word clickable.
  // opts.onclickAttr — full `onclick="..."` to attach (default = click-to-add).
  // opts.trackAdded — when false, don't dim already-added words (default true).
  function renderClickableRun(text, opts) {
    if (!text) return "";
    opts = opts || {};
    const onclickAttr = opts.onclickAttr || 'onclick="W.clickAddWord(this)"';
    const trackAdded = opts.trackAdded !== false;
    const parts = text.split(/(\s+)/);
    let html = "";
    for (const part of parts) {
      if (part === "") continue;
      if (/^\s+$/.test(part)) { html += esc(part); continue; }
      // peel leading/trailing punctuation off the Korean/latin core
      const m = part.match(/^([^가-힣A-Za-z0-9]*)([\s\S]*?)([^가-힣A-Za-z0-9]*)$/);
      const lead = m ? m[1] : "";
      const core = m ? m[2] : part;
      const trail = m ? m[3] : "";
      if (core && /[가-힣]/.test(core)) {
        const added = (trackAdded && clickAddedWords.has(core)) ? " cw-added" : "";
        const handler = added ? "" : ' ' + onclickAttr;
        html += esc(lead)
          + `<span class="clickword${added}" data-word="${esc(core)}"${handler}>${esc(core)}</span>`
          + esc(trail);
      } else {
        html += esc(part);
      }
    }
    return html;
  }

  function closeClickAddModal() {
    document.getElementById("clickadd-modal").style.display = "none";
    clickAddState = null;
  }

  async function clickAddWord(el) {
    if (!el || el.classList.contains("cw-added")) return;
    const word = el.getAttribute("data-word");
    if (!word) return;
    clickAddState = { word: word, el: el };

    const $modal = document.getElementById("clickadd-modal");
    const $body = document.getElementById("clickadd-body");
    $modal.style.display = "flex";
    $body.innerHTML = `
      <div class="spinner"></div>
      <div class="loading" style="text-align:center;">Looking up "${esc(word)}"...</div>`;

    // include the sentence the word was clicked in, for sense disambiguation.
    // Prefer the surrounding passage-sentence (if rendered inside one);
    // otherwise fall back to the current review card's sentence.
    let sentence = "";
    const sentEl = el.closest && el.closest(".passage-sentence");
    if (sentEl) {
      sentence = sentEl.getAttribute("data-sentence") || "";
    } else if (card && card.front) {
      sentence = card.front
        .replace(/\n\n질문:[\s\S]*$/, "")
        .replace(/\[\[(.+?)\]\]/g, "$1")
        .trim();
    }

    let data;
    try {
      data = await api("POST", "/api/define-word", { word: word, context: sentence });
    } catch (e) {
      $body.innerHTML = `<div class="error-text">Connection error</div>
        <div class="btn-row" style="margin-top:16px;">
          <button class="btn-secondary" onclick="W.closeClickAdd()">Close</button></div>`;
      return;
    }
    if (!data.ok) {
      $body.innerHTML = `<div class="error-text">${esc(data.error || "lookup failed")}</div>
        <div class="btn-row" style="margin-top:16px;">
          <button class="btn-secondary" onclick="W.closeClickAdd()">Close</button></div>`;
      return;
    }
    // sense-inventory picker (contextual sense pre-checked for a clicked word)
    showSensePicker(data, { mode: "click", el: el });
  }

  async function confirmClickAdd() {
    if (!clickAddState || !clickAddState.defBlock) return;
    const word = (clickAddState.parsed && clickAddState.parsed.term) || clickAddState.word;
    const surface = clickAddState.word;
    const defBlock = clickAddState.defBlock;
    const el = clickAddState.el;
    closeClickAddModal();

    let data;
    try {
      data = await api("POST", "/api/confirm-add-word",
                        { word: word, def_block: defBlock, hot_add: false });
    } catch (e) {
      showToast("Failed to add " + word + " — connection error", "error", 8000);
      return;
    }
    if (!data.ok) {
      showToast("Failed: " + word + " — " + (data.error || "unknown error"), "error", 8000);
      return;
    }
    clickAddedWords.add(surface);
    if (el) el.classList.add("cw-added");
    pollWordGen(data.task_id, word);
  }

  // Extend an existing word's definition to cover a newly-detected sense.
  async function extendSense() {
    if (!clickAddState || !clickAddState.extendedDef) return;
    const word = clickAddState.normWord || clickAddState.word;
    const extended = clickAddState.extendedDef;
    const sentence = clickAddState.contextSentence || "";
    closeClickAddModal();
    showToast("Extending " + word + "...", "pending");
    let data;
    try {
      data = await api("POST", "/api/extend-word-sense",
                        { word: word, extended_definition: extended, sentence: sentence });
    } catch (e) {
      showToast("Failed to extend " + word + " — connection error", "error", 8000);
      return;
    }
    if (!data.ok) {
      showToast("Failed: " + word + " — " + (data.error || "unknown"), "error", 8000);
      return;
    }
    showToast(word + " — new sense added", "success", 4000);
  }

  // ── passage mode: paste a paragraph, click words to add ─────────
  function passageMode() {
    state = "passage";
    $card.innerHTML = `
      <div style="align-self:stretch;display:flex;flex-direction:column;gap:12px;">
        <div style="text-align:center;color:var(--text-dim);font-size:14px;">
          Paste a paragraph — click any word to add it to the SRS.
        </div>
        <textarea id="passage-input" placeholder="Paste Korean text here..."
          style="width:100%;min-height:120px;padding:10px;font-size:16px;
                 background:var(--card-bg);color:var(--text);
                 border:1px solid var(--border);border-radius:8px;
                 font-family:inherit;resize:vertical;word-break:keep-all;"></textarea>
        <div class="btn-row">
          <button class="btn-primary" onclick="W.renderPassage()">Render</button>
          <button class="btn-secondary" onclick="W.clearPassage()">Clear</button>
        </div>
        <div id="passage-output" class="passage-output"></div>
      </div>`;
    $actions.innerHTML = `
      <div class="btn-row">
        <button class="btn-secondary" onclick="W.backToStart()">Back</button>
      </div>`;
  }

  // attribute-safe escape (extends esc with quote handling for attrs)
  function escAttr(s) { return esc(s).replace(/"/g, "&quot;"); }

  function renderPassage() {
    const $in = document.getElementById("passage-input");
    const $out = document.getElementById("passage-output");
    if (!$in || !$out) return;
    const text = ($in.value || "").trim();
    if (!text) { $out.innerHTML = ""; return; }

    // Split on blank lines into paragraphs, then on sentence-ending punct.
    // Each sentence is wrapped so a click can pull its sentence as context.
    const paragraphs = text.split(/\n\s*\n+/);
    let html = "";
    for (const para of paragraphs) {
      const flat = para.replace(/\s+/g, " ").trim();
      if (!flat) continue;
      const sentences = flat.split(/(?<=[.!?。！？])\s+/).filter(s => s.length > 0);
      html += `<p class="passage-paragraph">`;
      for (const s of sentences) {
        html += `<span class="passage-sentence" data-sentence="${escAttr(s)}">${renderClickableRun(s)}</span> `;
      }
      html += `</p>`;
    }
    $out.innerHTML = html;
  }

  function clearPassage() {
    const $in = document.getElementById("passage-input");
    const $out = document.getElementById("passage-output");
    if ($in) $in.value = "";
    if ($out) $out.innerHTML = "";
  }

  // ── passage review (Phase 2): generated passage with target words ─────
  let passageReviewData = null;     // {passage, targets:[{lexeme,item_id}]}
  let passageReviewExtras = [];     // per-row state for tapped non-targets

  function passageReview() {
    state = "passage_review_setup";
    $card.innerHTML = `
      <div style="align-self:stretch;text-align:center;">
        <div style="font-size:22px;margin-bottom:12px;">Passage Review</div>
        <div style="color:var(--text-dim);font-size:14px;margin-bottom:20px;">
          Read an LLM-generated passage that embeds your due words.<br>
          Tap any word you don't recognize.
        </div>
        <div style="display:flex;align-items:center;justify-content:center;gap:10px;">
          <label style="color:var(--text-dim);">Target words</label>
          <input id="pr-n-targets" type="number" min="3" max="10" value="5"
            style="width:60px;padding:6px;background:var(--card-bg);color:var(--text);
                   border:1px solid var(--border);border-radius:6px;
                   font-size:16px;text-align:center;">
        </div>
      </div>`;
    $actions.innerHTML = `
      <div class="btn-row">
        <button class="btn-primary" onclick="W.startPassageReview()">Generate Passage</button>
        <button class="btn-secondary" onclick="W.backToStart()">Cancel</button>
      </div>`;
  }

  async function startPassageReview() {
    const $in = document.getElementById("pr-n-targets");
    const n = $in ? Math.max(3, Math.min(10, parseInt($in.value, 10) || 5)) : 5;

    state = "passage_review_loading";
    $card.innerHTML = `
      <div class="spinner"></div>
      <div class="loading" style="text-align:center;">Generating passage with ${n} due words...</div>`;
    $actions.innerHTML = `
      <div class="btn-row">
        <button class="btn-secondary" onclick="W.backToStart()">Cancel</button>
      </div>`;

    let data;
    try {
      data = await api("POST", "/api/passage-review/generate", { n_targets: n });
    } catch (e) {
      $card.innerHTML = `<div class="error-text">Connection error</div>`;
      $actions.innerHTML = `<div class="btn-row"><button class="btn-secondary" onclick="W.backToStart()">Back</button></div>`;
      return;
    }
    if (!data.ok) {
      $card.innerHTML = `<div class="error-text">${esc(data.error)}</div>`;
      $actions.innerHTML = `<div class="btn-row"><button class="btn-secondary" onclick="W.backToStart()">Back</button></div>`;
      return;
    }
    renderPassageReviewActive(data);
  }

  function renderPassageReviewActive(data) {
    state = "passage_review_active";
    passageReviewData = data;

    const passage = data.passage || "";
    let html = "";
    const re = /\[\[([^\]|]+)\|([^\]]+)\]\]/g;
    let last = 0, m;
    const tapOnclick = 'onclick="W.togglePassageTap(this)"';
    while ((m = re.exec(passage)) !== null) {
      html += renderClickableRun(passage.slice(last, m.index),
                                  { onclickAttr: tapOnclick, trackAdded: false });
      const surface = m[1], lex = m[2];
      html += `<span class="clickword" data-target="${escAttr(lex)}" data-word="${escAttr(surface)}" ${tapOnclick}>${esc(surface)}</span>`;
      last = m.index + m[0].length;
    }
    html += renderClickableRun(passage.slice(last),
                                { onclickAttr: tapOnclick, trackAdded: false });

    const missingNote = (data.missing && data.missing.length > 0)
      ? `<div style="color:var(--orange);font-size:12px;text-align:center;margin-top:8px;">
           (LLM omitted: ${data.missing.map(esc).join(", ")})</div>`
      : "";

    $card.innerHTML = `
      <div style="align-self:stretch;">
        <div id="passage-review-note" style="text-align:center;color:var(--text-dim);font-size:14px;margin-bottom:14px;">
          Read the passage and translate it in your head first. Tap any word you don't recognize.
        </div>
        <div class="passage-output" id="passage-review-output">${html}</div>
        <div id="passage-review-translation"></div>
        ${missingNote}
      </div>`;
    $actions.innerHTML = `
      <div class="btn-row">
        <button class="btn-primary" onclick="W.revealPassageTranslation()">Show Translation</button>
        <button class="btn-secondary" onclick="W.backToStart()">Cancel</button>
      </div>`;
  }

  function togglePassageTap(el) {
    if (el) el.classList.toggle("cw-tapped");
  }

  // Phase 2: reveal the translation, then allow one more tapping pass before
  // grading. Taps from phase 1 persist (same DOM), so the final tapped set is
  // the union of both passes.
  function revealPassageTranslation() {
    const $t = document.getElementById("passage-review-translation");
    if (!$t || $t.dataset.shown) return;
    $t.dataset.shown = "1";
    const tr = (passageReviewData && passageReviewData.translation) || "";
    $t.innerHTML = `
      <div class="card-divider" style="margin:18px auto;"></div>
      <div style="color:var(--text-dim);font-size:16px;line-height:1.6;white-space:pre-wrap;word-break:keep-all;">${esc(tr)}</div>`;
    const note = document.getElementById("passage-review-note");
    if (note) note.innerHTML = "One more pass — now that you've seen the meaning, tap any word you still didn't actually know, then Submit.";
    $actions.innerHTML = `
      <div class="btn-row">
        <button class="btn-primary" onclick="W.submitPassageReview()">Submit</button>
        <button class="btn-secondary" onclick="W.backToStart()">Cancel</button>
      </div>`;
  }

  async function submitPassageReview() {
    if (!passageReviewData) return;
    const $out = document.getElementById("passage-review-output");
    if (!$out) return;

    // Per-lexeme tap: tapped if any span carrying this lexeme is tapped.
    const tappedByLex = {};
    for (const t of passageReviewData.targets) tappedByLex[t.lexeme] = false;
    $out.querySelectorAll(".clickword[data-target].cw-tapped").forEach(span => {
      tappedByLex[span.getAttribute("data-target")] = true;
    });

    // Tapped non-target Korean words → add-word candidates (dedup)
    const extraSet = new Set();
    $out.querySelectorAll(".clickword.cw-tapped:not([data-target])").forEach(span => {
      const w = span.getAttribute("data-word");
      if (w) extraSet.add(w);
    });
    const extras = [...extraSet];

    // Plain-text passage for the context field on each define call
    const passageContext = (passageReviewData.passage || "")
      .replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g, "$1");

    state = "passage_review_submitting";
    $card.innerHTML = `<div class="spinner"></div><div class="loading" style="text-align:center;">Grading targets...</div>`;
    $actions.innerHTML = "";

    let data;
    try {
      data = await api("POST", "/api/passage-review/submit", {
        targets: passageReviewData.targets.map(t => ({
          lexeme: t.lexeme,
          item_id: t.item_id,
          tapped: !!tappedByLex[t.lexeme],
        })),
      });
    } catch (e) {
      showToast("Submit failed — connection error", "error", 8000);
      backToStart();
      return;
    }
    if (!data.ok) {
      showToast("Submit failed: " + (data.error || "unknown"), "error", 8000);
      backToStart();
      return;
    }
    renderPassageReviewResults(data.target_results || [], extras, passageContext);
  }

  function renderPassageReviewResults(targetResults, extras, passageContext) {
    state = "passage_review_results";
    passageReviewExtras = new Array(extras.length).fill(null);

    const passed = targetResults.filter(t => t.passed);
    const failed = targetResults.filter(t => !t.passed);
    const summary = `
      <div style="text-align:center;">
        <div style="font-size:18px;margin-bottom:6px;">
          <span style="color:var(--green);">${passed.length} passed</span>
          ${failed.length ? `<span style="color:var(--text-dim);"> · </span><span style="color:var(--red);">${failed.length} failed</span>` : ""}
        </div>
        <div style="color:var(--text-dim);font-size:13px;">${targetResults.length} target words reviewed</div>
      </div>
      <details style="margin-top:12px;">
        <summary style="cursor:pointer;color:var(--text-dim);font-size:13px;text-align:center;">Target details</summary>
        <div style="margin-top:8px;font-size:14px;">
          ${targetResults.map(t => {
            if (!t.ok) return `<div style="color:var(--text-dim);">- ${esc(t.lexeme)} (${esc(t.error || "skipped")})</div>`;
            const tag = t.passed
              ? `<span style="color:var(--green);">✓</span>`
              : `<span style="color:var(--red);">✗</span>`;
            const tail = t.passed
              ? `H ${t.old_H_days}d → ${t.new_H_days}d`
              : `→ repair`;
            return `<div>${tag} ${esc(t.lexeme)} — ${tail}</div>`;
          }).join("")}
        </div>
      </details>`;

    let extrasSection = "";
    if (extras.length > 0) {
      extrasSection = `
        <div style="margin-top:18px;border-top:1px solid var(--border);padding-top:14px;">
          <div style="font-size:15px;margin-bottom:8px;">
            Tapped words to add (${extras.length})
          </div>
          <div id="pr-extras-list">
            ${extras.map((w, i) => `
              <div class="pr-extra-row" id="pr-extra-${i}"
                   style="display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);">
                <input type="checkbox" class="pr-extra-check" disabled style="margin-top:4px;flex:0 0 auto;">
                <div style="flex:1;min-width:0;">
                  <div style="font-weight:600;">${esc(w)}</div>
                  <div class="pr-extra-def" style="font-size:13px;color:var(--text-dim);margin-top:2px;">Looking up…</div>
                </div>
              </div>`).join("")}
          </div>
        </div>`;
    }

    $card.innerHTML = `<div style="align-self:stretch;">${summary}${extrasSection}</div>`;
    $actions.innerHTML = extras.length > 0
      ? `<div class="btn-row">
           <button class="btn-primary" id="pr-commit-btn" onclick="W.commitPassageExtras()" disabled>Add Selected</button>
           <button class="btn-secondary" onclick="W.backToStart()">Done</button>
         </div>`
      : `<div class="btn-row">
           <button class="btn-secondary" onclick="W.backToStart()">Done</button>
         </div>`;

    // Progressively define each extra
    for (let i = 0; i < extras.length; i++) {
      defineExtraForPassage(i, extras[i], passageContext);
    }
  }

  async function defineExtraForPassage(i, surface, context) {
    const row = document.getElementById(`pr-extra-${i}`);
    if (!row) return;
    const $def = row.querySelector(".pr-extra-def");
    const $check = row.querySelector(".pr-extra-check");

    let data;
    try {
      data = await api("POST", "/api/define-word",
                        { word: surface, context: context });
    } catch (e) {
      $def.textContent = "(connection error)";
      return;
    }

    if (!data.ok) {
      $def.textContent = "(" + (data.error || "lookup failed") + ")";
      passageReviewExtras[i] = { surface: surface, can_add: false };
      refreshCommitBtn();
      return;
    }
    const senses = data.senses || [];
    // pick the sense actually used in the passage (contextual), else the first
    // not-yet-added sense
    const chosen = senses.find(s => s.slug === data.context_slug && !s.exists)
                || senses.find(s => !s.exists);
    if (data.all_exist || !chosen) {
      $def.innerHTML = `<span style="color:var(--text-dim);">${esc(data.word || surface)} — already in your deck</span>`;
      passageReviewExtras[i] = { surface: surface, can_add: false };
      refreshCommitBtn();
      return;
    }
    const hj = (chosen.hanja && chosen.hanja.has_hanja && chosen.hanja.hanja)
      ? ` <span style="color:var(--text-dim);">${esc(chosen.hanja.hanja)}</span>` : "";
    $def.innerHTML = `<span style="color:var(--text);">${esc(data.word)}</span>${hj} — ${esc(chosen.definition_en)}`;
    $check.disabled = false;
    $check.checked = true;
    $check.addEventListener("change", refreshCommitBtn);
    passageReviewExtras[i] = {
      surface: surface, word: data.word, tagged: !!data.tagged,
      senses: [{ slug: chosen.slug, definition_en: chosen.definition_en, hanja: chosen.hanja }],
      can_add: true,
    };
    refreshCommitBtn();
  }

  function refreshCommitBtn() {
    const $btn = document.getElementById("pr-commit-btn");
    if (!$btn) return;
    let anyChecked = false;
    for (let i = 0; i < passageReviewExtras.length; i++) {
      const e = passageReviewExtras[i];
      if (!e || !e.can_add) continue;
      const row = document.getElementById(`pr-extra-${i}`);
      if (!row) continue;
      const $check = row.querySelector(".pr-extra-check");
      if ($check && $check.checked) { anyChecked = true; break; }
    }
    $btn.disabled = !anyChecked;
  }

  async function commitPassageExtras() {
    const toAdd = [];
    for (let i = 0; i < passageReviewExtras.length; i++) {
      const e = passageReviewExtras[i];
      if (!e || !e.can_add) continue;
      const row = document.getElementById(`pr-extra-${i}`);
      if (!row) continue;
      const $check = row.querySelector(".pr-extra-check");
      if ($check && $check.checked) toAdd.push(e);
    }
    if (toAdd.length === 0) { backToStart(); return; }

    showToast(`Adding ${toAdd.length} word${toAdd.length === 1 ? "" : "s"}…`, "pending", 3000);
    for (const e of toAdd) {
      try {
        const data = await api("POST", "/api/confirm-add-word",
                                { word: e.word, senses: e.senses, tagged: e.tagged, hot_add: false });
        if (data.ok) pollWordGen(data.task_id, e.word);
        else showToast("Failed: " + e.word + " — " + (data.error || ""), "error", 6000);
      } catch (err) {
        showToast("Failed: " + e.word + " — connection error", "error", 6000);
      }
    }
    backToStart();
  }

  // ── HTML escaping ───────────────────────────────────────
  function esc(s) {
    if (!s) return "";
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  // ── expose to onclick handlers ──────────────────────────
  window.W = {
    submitIntro: submitIntro,
    showAnswer: showAnswer,
    grade: submitGrade,
    editCard: editCard,
    deleteVariant: deleteVariant,
    addVariant: addVariant,
    startSession: startSession,
    resumeSession: resumeSession,
    quarantineWord: quarantineWord,
    lookupHanja: lookupHanja,
    addWord: addWord,
    submitAddWordInput: submitAddWordInput,
    submitSensePicker: submitSensePicker,
    confirmAdd: confirmAdd,
    clickAddWord: clickAddWord,
    confirmClickAdd: confirmClickAdd,
    closeClickAdd: closeClickAddModal,
    extendSense: extendSense,
    passageMode: passageMode,
    renderPassage: renderPassage,
    clearPassage: clearPassage,
    passageReview: passageReview,
    startPassageReview: startPassageReview,
    togglePassageTap: togglePassageTap,
    revealPassageTranslation: revealPassageTranslation,
    submitPassageReview: submitPassageReview,
    commitPassageExtras: commitPassageExtras,
    addDiffPair: addDiffPair,
    confirmAddDiffPair: confirmAddDiffPair,
    manageIntros: manageIntros,
    saveIntroOrder: saveIntroOrder,
    spreadHomonyms: spreadHomonyms,
    introBack: introBack,
    backToStart: backToStart,
    adjustParam: adjustParam,
    addNewWords: addNewWords,
    activateGrammar: activateGrammar,
    // grammar
    startGrammar: startGrammar,
    grammarSubmitAnswer: grammarSubmitAnswer,
    grammarGrade: grammarGrade,
    endGrammar: endGrammar,
    addPattern: addPattern,
    confirmAddPattern: confirmAddPattern,
  };

  // ── boot ────────────────────────────────────────────────
  renderStartScreen();
})();
</script>
</body>
</html>
